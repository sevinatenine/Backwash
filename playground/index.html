<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>

    <style>
        body {
            display: flex;
            flex-direction: row;
            margin: 0;
        }

        #editor {
            height: 100vh;
            border: 1px solid black;
            flex: 7;
        }

        #io {
            height: 100vh;
            border: 1px solid black;
            flex: 3;
            display: flex;
            flex-direction: column;
        }

        #topBar {

        }

        #terminal {
            flex: 1;
        }
    </style>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/backwash-lang@latest/src/code.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
</head>
<body>
    <div id="editor"></div>
    <div id="io">
        <div id="topBar">
            <button id="run">Run</button>
            <button id="stop">Stop</button>
        </div>
        <div id="terminal"></div>
    </div>

    <script>
        const runButton = document.getElementById("run");
        const stopButton = document.getElementById("stop");

        function exit(errCode) {
            console.trace(`Exited: ${errCode}`);
        }

        function logError(...data) {
            console.error(...data);
        }

        function fatal(...data) {
            logError(`[FATAL] `, ...data);
            exit(1);
        }

        function fatalNoExit(...data) {
            logError(`[FATAL] `, ...data);
        }

        function codeError(err, lineNumber) {
            logError(`Error on line ${lineNumber + 1}: ${err}`);
            exit(1);
        }

        async function inFunc() {
            // const buf = Buffer.alloc(1);

            // while (true) {
            //     try {
            //         const bytes = fs.readSync(inFd, buf, 0, 1, null);

            //         if (bytes === 0) return 0;

            //         const val = buf[0];

            //         // strip newline + carriage return
            //         if (val === 10 || val === 13) {
            //             continue;
            //         }

            //         return val;
            //     } catch (e) {
            //         if (e.code === "EAGAIN") {
            //             continue; // wait until input is available
            //         }
            //         throw e;
            //     }
            // }

            return new Promise(resolve => setTimeout(resolve, 5000));
        }

        function outFunc(char) {
            console.log(char);
        }

        const term = new Terminal({ convertEol: true, cursorBlink: true });
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById("terminal"));
        fitAddon.fit();
        window.addEventListener("resize", () => fitAddon.fit());

        const code = `
        . 72
        . 101
        . 108
        . 108
        . 111
        . 44
        . 32
        . 87
        . 111
        . 114
        . 108
        . 100
        . 33
        . 10
        `;

        var controller;

        async function main() {
            const runCode = window.BackwashRun;
            if (!runCode) {
                console.log("BackwashRun not found!");
                return false;
            }

            runButton.addEventListener("click", async function() {
                controller = new AbortController();

                await runCode(code, inFunc, outFunc, codeError, controller.signal);
                console.log("Finished");
            });

            stopButton.addEventListener("click", async function() {
                if (controller) {
                    controller.abort();
                }
            })
        }

        main();
        
    </script>
</body>
</html>
